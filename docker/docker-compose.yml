services:
  webapp:
    build:
      context: ../webapp
      dockerfile: Dockerfile
      target: runner-nginx
    image: logiq-webapp:latest
    container_name: logiq-webapp
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - logiq-network

networks:
  logiq-network:
    driver: bridge
