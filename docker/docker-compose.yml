services:
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: logiq-api:latest
    container_name: logiq-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Azure__Storage__ConnectionString=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;}
      - Azure__Storage__EmployeesTable=LogiqEmployees
      - Azure__Storage__SignalsTable=LogiqSignals
      - Azure__Storage__MeetingsTable=LogiqMeetings
      - Azure__Storage__TeamKpiSnapshotsTable=LogiqTeamKpiSnapshots
      - Azure__OpenAI__Endpoint=${AZURE_OPENAI_ENDPOINT:-}
      - Azure__OpenAI__ApiKey=${AZURE_OPENAI_API_KEY:-}
      - Azure__OpenAI__DeploymentName=${AZURE_OPENAI_DEPLOYMENT:-gpt-4}
      - Azure__Search__Endpoint=${AZURE_SEARCH_ENDPOINT:-}
      - Azure__Search__ApiKey=${AZURE_SEARCH_API_KEY:-}
      - Azure__Search__IndexName=${AZURE_SEARCH_INDEX:-logiq-index}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - logiq-network
    depends_on:
      - azurite

  webapp:
    build:
      context: ../webapp
      dockerfile: Dockerfile
      target: runner-nginx
    image: logiq-webapp:latest
    container_name: logiq-webapp
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://api:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - logiq-network
    depends_on:
      - api

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: logiq-azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --debug /data/debug.log
    restart: unless-stopped
    networks:
      - logiq-network

networks:
  logiq-network:
    driver: bridge

volumes:
  azurite-data:
    driver: local
